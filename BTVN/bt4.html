<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="name" type="text" placeholder="Họ và tên">
    <input id="age" type="number" placeholder="Tuổi">
    <button id="saveBtn">Lưu thông tin</button>

<p id="display"></p>


    <script>

    const nameInput = document.getElementById("name");
    const ageInput = document.getElementById("age");
    const btn = document.getElementById("saveBtn");
    const display = document.getElementById("display");

    window.addEventListener("load", () => {

        const data = localStorage.getItem("myProfile");
    });

    btn.addEventListener("click", () => {

        const name = nameInput.value;
        const age = ageInput.value;

        const profile = {
            name: name,
            age: age
        };

        localStorage.setItem("myProfile", JSON.stringify(profile));

        display.innerHTML = `Tên: ${profile.name} | Tuổi: ${profile.age}`;

});
    </script>
</body>
</html>
