<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input id="name" type="text" placeholder="Họ và tên">
    <input id="age" type="number" placeholder="Tuổi">

    <button id="saveBtn">Lưu thông tin</button>
    <button id="deleteBtn">Xóa hồ sơ</button>

    <p id="display"></p>

    <script>
        const nameInput = document.getElementById("name");
        const ageInput = document.getElementById("age");
        const saveBtn = document.getElementById("saveBtn");
        const deleteBtn = document.getElementById("deleteBtn");
        const display = document.getElementById("display");

        window.addEventListener("load", () => {

            const data = localStorage.getItem("myProfile");

        });

        saveBtn.addEventListener("click", () => {

            const name = nameInput.value;
            const age = ageInput.value;

            const profile = {
                name: name,
                age: age
            };

            localStorage.setItem("myProfile", JSON.stringify(profile));

            display.innerHTML = `Tên: ${profile.name} | Tuổi: ${profile.age}`;

        });

        deleteBtn.addEventListener("click", () => {

            localStorage.removeItem("myProfile");

            display.innerHTML = "Chưa có thông tin cá nhân";

        });
    </script>

</body>

</html>
